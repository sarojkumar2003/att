services:
  # Backend Service (Web Service)
  - type: web
    name: dihadi-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: PORT
        value: 5000

  # Frontend Service (Static Site)
  - type: static
    name: dihadi-frontend
    env: static
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: dihadi-backend
          property: host
